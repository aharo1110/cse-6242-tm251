{{ bootstrap.load_js() }}

<!DOCTYPE html>
<head>
    <title>Data on Matchdate {{name}}</title>
    <script type="text/javascript" src="https://d3js.org/d3.v5.min.js"></script>
    <script type="text/javascript" src="https://d3js.org/d3-dsv.min.js"></script>
</head>
<body>
    <div class="container-sm" style="padding:3em;">
        <h2>Matchdate: {{name}}</h2>
        <p>Time at the bottom is in UTC.<br>The vertical axis shows the amount of tweets over time in the match.<br>In order to find info on sentiment during event(s) hover over with the mouse.</p>
        <a href="/">Go Back</a>
        <div id="histogram"></div>
    </div>


    <script>
        // Dimensions/margins
        var margin = {top: 10, right: 30, bottom: 30, left: 40},
        width = 1200 - margin.left - margin.right,
        height = 500 - margin.top - margin.bottom;

        // SVG obj
        var svg = d3.select("#histogram")
            .append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g")
            .attr("transform",
                "translate(" + margin.left + "," + margin.top + ")");
        
        const parse_time = d3.utcParse("%Y-%m-%d %H:%M:%S")

        // data parse
        d3.dsv(",", "{{ url_for('static', filename=path)}}", function(d) {
                return {
                    nearest_event_match: d.nearest_event_match,
                    nearest_event_type: d.nearest_event_type,
                    datetime: new Date(parse_time(d.datetime)),
                    vader_compound: d.vader_compound,
                    tb_polarity: d.tb_polarity,
                    emo_joy: d.emo_joy,
                    emo_sadness: d.emo_sadness,
                    emo_anger: d.emo_anger,
                    emo_fear: d.emo_fear,
                    emo_disgust: d.emo_disgust,
                    emo_surprise: d.emo_surprise,
                    emo_neutral: d.emo_neutral
                    // Add more if necessary
                }
            })
            .then(function(data) {
                data = data.filter(function(d){return d.datetime.toISOString().substring(0, 10) == "{{ name }}"})
                event_data = data.filter(function(d){return d.nearest_event_match != "none"})
                
                event_start = d3.min(event_data, function(d) {return +d.datetime})
                event_end = d3.max(event_data, function(d) {return +d.datetime})

                event_attributes = {
                    match: event_data[0]["nearest_event_match"],
                    type: event_data[0]["nearest_event_type"]
                }

                event_sentiment = {
                    vader_avg: d3.mean(event_data, function(d) { return d.vader_compound}),
                    tb_avg: d3.mean(event_data, function(d) { return d.tb_polarity}),
                    emo_joy: d3.mean(event_data, function(d) { return d.emo_joy}),
                    emo_sadness: d3.mean(event_data, function(d) { return d.emo_sadness}),
                    emo_anger: d3.mean(event_data, function(d) { return d.emo_anger}),
                    emo_fear: d3.mean(event_data, function(d) { return d.emo_fear}),
                    emo_disgust: d3.mean(event_data, function(d) { return d.emo_disgust}),
                    emo_surprise: d3.mean(event_data, function(d) { return d.emo_surprise}),
                    emo_neutral: d3.mean(event_data, function(d) { return d.emo_neutral}),
                }

                console.log(event_start)
                console.log(event_end)
                console.log(event_attributes)
                console.log(event_sentiment)
                // X axis
                var x = d3.scaleLinear()
                    .domain([d3.min(data, function(d) { return +d.datetime }), d3.max(data, function(d) { return +d.datetime })])
                    .range([0, width]);
                
                // X axis ticks
                svg.append("g")
                    .attr("transform", "translate(0," + height + ")")
                    .call(d3.axisBottom(x).tickFormat(d3.utcFormat("%H:%M:%S")));

                // Histogram's parameters
                var histogram = d3.histogram()
                    .value(function(d) { return d.datetime; })
                    .domain(x.domain())
                    .thresholds(x.ticks(400));

                // Bins of histogram
                var bins = histogram(data);

                // Y axis
                var y = d3.scaleLinear()
                    .range([height, 0]);
                y.domain([0, d3.max(bins, function(d) { return d.length; })]);
                
                // Y axis ticks
                svg.append("g")
                    .call(d3.axisLeft(y));

                // Histogram bar rects
                svg.selectAll("rect")
                    .data(bins)
                    .enter()
                    .append("rect")
                        .attr("x", 1)
                        .attr("transform", function(d) { return "translate(" + x(d.x0) + "," + y(d.length) + ")"; })
                        .attr("width", function(d) { return x(d.x1) - x(d.x0) -1 ; })
                        .attr("height", function(d) { return height - y(d.length); })
                        .style("fill", "#4F6F8F")

                svg.append("rect")
                    .attr("x", x(event_start))
                    .attr("width", function(d) { return x(event_end) - x(event_start);})
                    .attr("height", height)
                    .style("fill", "#2F4F6F")
                    .style("opacity", "30%")
                    .on("mouseover", event_mouseover)
                    .on("mouseout", event_mouseout)




                function event_mouseover(d, i) {
                    d3.select(this)
                        .transition()
                        .duration(0)
                        .style("opacity", "60%")
                }

                function event_mouseout(d, i) {
                    d3.select(this)
                        .transition()
                        .duration(0)
                        .style("opacity", "30%")
                }
            });
    </script>
    
</body>
